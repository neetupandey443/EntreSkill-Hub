<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Roadmap</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container py-5 text-center">

  <h2 class="mb-5">Business Roadmap 🚀</h2>

  <!-- Roadmap container -->
  <div id="roadmapContainer"></div>

  <!-- Button -->
  <div class="mt-4">
    <button onclick="goDashboard()" class="btn btn-primary">
      Go to Dashboard 🚀
    </button>
  </div>

</div>

<!-- ✅ SCRIPT (IMPORTANT: BODY KE END ME) -->
<script>

function goDashboard() {
  window.location.href = "dashboard.html";
}

// 🔥 LOAD ROADMAP AFTER PAGE LOAD
window.onload = function () {

  const skill = localStorage.getItem("selectedSkill");

  const roadmapData = {
    "Web Development": [
      "Learn HTML, CSS, JavaScript",
      "Build projects",
      "Learn React",
      "Start freelancing"
    ],
    "Graphic Design": [
      "Learn Canva / Photoshop",
      "Create portfolio",
      "Work with clients"
    ]
  };

  const container = document.getElementById("roadmapContainer");

  if (skill && roadmapData[skill]) {
    roadmapData[skill].forEach(step => {
      container.innerHTML += `<p class="fs-5">✅ ${step}</p>`;
    });
  } else {
    container.innerHTML = "<p class='text-danger'>No roadmap found ❌</p>";
  }

};

</script>

</body>
</html>
