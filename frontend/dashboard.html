<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5 text-center">

  <h1 class="mb-4">Welcome to Dashboard 🎉</h1>

  <!-- 🔥 ROADMAP SHOW HERE -->
  <div id="dashboardContent" class="mb-4"></div>

  <!-- Logout Button -->
  <button onclick="logout()" class="btn btn-danger">Logout</button>

</div>

<script>
const token = localStorage.getItem("token");

if (!token) {
  alert("Please login first ❌");
  window.location.href = "login.html";
}

// 🔥 SHOW SELECTED SKILL
const skill = localStorage.getItem("selectedSkill");

const content = document.getElementById("dashboardContent");

if(skill){
  content.innerHTML = `
    <h3>Your Selected Skill:</h3>
    <p class="fs-4 text-primary">${skill}</p>
  `;
} else {
  content.innerHTML = `<p class="text-danger">No skill selected ❌</p>`;
}

// logout
function logout() {
  localStorage.removeItem("token");
  window.location.href = "login.html";
}
</script>

</body>
</html>
